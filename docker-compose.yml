services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atsforge}
      POSTGRES_USER: ${POSTGRES_USER:-atsforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 4s
      retries: 12
    ports: ["5432:5432"]

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio-change-me}
    volumes:
      - object_data:/data
    ports: ["9000:9000", "9001:9001"]

  create-bucket:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minio} ${S3_SECRET_KEY:-minio-change-me}; do sleep 2; done;
      mc mb --ignore-existing local/${S3_BUCKET:-atsforge-resumes}; exit 0"

  mailpit:
    image: axllent/mailpit:latest
    ports: ["1025:1025", "8025:8025"]

  api:
    build: ./backend
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      create-bucket: { condition: service_completed_successfully }
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-atsforge}
      DATABASE_USERNAME: ${POSTGRES_USER:-atsforge}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      REDIS_HOST: redis
      MAIL_HOST: mailpit
      JWT_SECRET: ${JWT_SECRET:-local-only-key-change-this-before-production-64-bytes-minimum-0000000000000000}
      APP_PUBLIC_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-atsforge-resumes}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio-change-me}
    ports: ["8080:8080"]

  web:
    build: ./frontend
    depends_on: [api]
    ports: ["5173:80"]

volumes:
  postgres_data:
  redis_data:
  object_data:

