spring:
  application:
    name: atsforge-api
  profiles:
    default: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/atsforge}
    username: ${DATABASE_USERNAME:atsforge}
    password: ${DATABASE_PASSWORD:change-me-in-production}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:4}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        default_batch_fetch_size: 32
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  cache:
    type: redis
    redis:
      time-to-live: 10m
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled}
            scope: profile,email
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: ${COOKIE_SECURE:false}
        http-only: true
        same-site: lax

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

app:
  public-url: ${APP_PUBLIC_URL:http://localhost:5173}
  cors-origins: ${CORS_ORIGINS:http://localhost:5173}
  jwt:
    issuer: atsforge-api
    secret: ${JWT_SECRET:local-only-key-change-this-before-production-64-bytes-minimum-0000000000000000}
    access-token-duration: PT15M
    refresh-token-duration: P30D
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4.1}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    pro-monthly-price-id: ${STRIPE_PRO_MONTHLY_PRICE_ID:price_pro_monthly}
    pro-yearly-price-id: ${STRIPE_PRO_YEARLY_PRICE_ID:price_pro_yearly}
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:atsforge-resumes}
    access-key: ${S3_ACCESS_KEY:minio}
    secret-key: ${S3_SECRET_KEY:minio-change-me}
  limits:
    api-per-minute: ${API_RATE_LIMIT:120}
    ai-per-hour-free: ${AI_FREE_LIMIT:3}
    free-exports-per-month: ${FREE_EXPORT_LIMIT:5}

